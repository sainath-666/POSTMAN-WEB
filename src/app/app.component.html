<div class="app-layout" [class.theme-light]="theme === 'light'">
  <!-- ═══ Top Navigation Bar ═══ -->
  <header class="app-header">
    <div class="header-left">
      <button class="btn-hamburger" (click)="toggleSidebar()" title="Toggle Sidebar (Ctrl+B)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          @if (sidebarOpen) {
            <path d="M21 3H3v18h18V3z M9 3v18"/>
          } @else {
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          }
        </svg>
      </button>
      <div class="app-brand">
        <span class="brand-icon">⚡</span>
        <h1 class="brand-name">API Tester</h1>
        <span class="brand-badge">PRO</span>
      </div>
    </div>

    <div class="header-center">
      <!-- Environment Selector -->
      <div class="env-selector">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <select class="env-select" [ngModel]="envService.activeEnvironmentId()"
          (ngModelChange)="setActiveEnvironment($event === 'null' ? null : $event)">
          <option value="null">No Environment</option>
          @for (env of envService.environments(); track env.id) {
            <option [value]="env.id">{{ env.name }}</option>
          }
        </select>
        <button class="btn-icon-sm" title="Manage Environments (Ctrl+E)" (click)="showEnvModal = true">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </button>
      </div>
    </div>

    <div class="header-right">
      <button class="btn-icon-sm" title="Toggle Console (Ctrl+\`)" (click)="toggleConsole()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      </button>
      <button class="btn-icon-sm" [title]="theme === 'dark' ? 'Light Mode' : 'Dark Mode'" (click)="toggleTheme()">
        @if (theme === 'dark') {
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        } @else {
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        }
      </button>
    </div>
  </header>

  <!-- ═══ Main Content ═══ -->
  <div class="app-body">
    <!-- Sidebar -->
    <aside class="panel panel-sidebar" [class.collapsed]="!sidebarOpen">
      <app-sidebar />
    </aside>

    <!-- Main Area (tabs + builder + response) -->
    <div class="main-area">
      <!-- Tab Bar -->
      <app-tab-bar />

      <!-- Panels -->
      <div class="panels">
        <section class="panel panel-builder">
          <app-request-builder />
        </section>
        <div class="panel-divider"></div>
        <section class="panel panel-response">
          <app-response-viewer />
        </section>
      </div>

      <!-- Console (collapsible bottom) -->
      @if (consoleOpen) {
        <div class="console-area">
          <app-console-panel />
        </div>
      }
    </div>
  </div>

  <!-- ═══ Status Bar ═══ -->
  <footer class="status-bar">
    <div class="status-left">
      @if (envService.activeEnvironment()) {
        <span class="status-env">
          <span class="status-dot active"></span>
          {{ envService.activeEnvironment()?.name }}
        </span>
      } @else {
        <span class="status-env">
          <span class="status-dot"></span>
          No Environment
        </span>
      }
    </div>
    <div class="status-right">
      <span class="status-hint">Ctrl+Enter Send</span>
      <span class="status-sep">|</span>
      <span class="status-hint">Ctrl+T New Tab</span>
      <span class="status-sep">|</span>
      <span class="status-hint">Ctrl+E Environments</span>
    </div>
  </footer>
</div>

<!-- Environment Modal -->
@if (showEnvModal) {
  <app-environment-modal (close)="showEnvModal = false" />
}

<!-- Toasts -->
<app-toast />
